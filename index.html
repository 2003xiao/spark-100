<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💫 100天火花纪念日</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a1a;
    font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  /* ===== 星空背景 ===== */
  .stars {
    position: fixed; inset: 0; z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ===== 极光背景 ===== */
  .aurora {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 30% 40%, rgba(255, 100, 150, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 70% 60%, rgba(100, 180, 255, 0.10) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 80%, rgba(200, 120, 255, 0.08) 0%, transparent 60%);
    animation: auroraShift 8s ease-in-out infinite;
  }
  @keyframes auroraShift {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* ===== 漂浮粒子 ===== */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .particle {
    position: absolute;
    width: var(--size); height: var(--size);
    background: var(--color);
    border-radius: 50%;
    animation: floatUp var(--dur) var(--delay) ease-in infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
    10% { opacity: 0.8; transform: translateY(-10vh) translateX(10px) scale(1); }
    100% { transform: translateY(-110vh) translateX(var(--drift)) scale(0.3); opacity: 0; }
  }

  /* ===== 心形粒子 ===== */
  .hearts-container { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
  .floating-heart {
    position: absolute;
    animation: heartFloat var(--dur) var(--delay) ease-in-out infinite;
    font-size: var(--size);
    opacity: 0;
  }
  @keyframes heartFloat {
    0% { transform: translateY(0) rotate(0deg) scale(0); opacity: 0; }
    20% { opacity: 0.7; transform: translateY(-30vh) rotate(var(--rot)) scale(1); }
    100% { transform: translateY(-110vh) rotate(var(--rot2)) scale(0.2); opacity: 0; }
  }

  /* ===== 主卡片 ===== */
  .main-container {
    position: relative; z-index: 10;
    text-align: center;
  }

  .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 30px;
    padding: 50px 60px;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.4),
      0 0 80px rgba(255, 120, 180, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    animation: cardEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(30px);
  }
  @keyframes cardEnter {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== 火花图标 ===== */
  .spark-icon {
    font-size: 64px;
    animation: sparkPulse 1.5s ease-in-out infinite;
    display: inline-block;
    filter: drop-shadow(0 0 20px rgba(255, 180, 50, 0.6));
    margin-bottom: 10px;
  }
  @keyframes sparkPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* ===== 100 数字 ===== */
  .number-100 {
    font-size: 120px;
    font-weight: bold;
    background: linear-gradient(135deg, #ff6b9d, #ff8c5a, #ffd159, #ff6b9d);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 3s ease-in-out infinite;
    line-height: 1;
    margin: 10px 0;
    filter: drop-shadow(0 0 30px rgba(255, 120, 150, 0.5));
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    font-size: 28px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 4px;
    margin-bottom: 20px;
  }

  .divider {
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    margin: 20px auto;
  }

  .message {
    font-size: 18px;
    color: rgba(255, 255, 255, 0.65);
    line-height: 1.8;
    max-width: 420px;
    margin: 0 auto;
  }
  .message span {
    color: rgba(255, 255, 255, 0.85);
  }

  /* ===== 每日火花条 ===== */
  .streak-bar-container {
    margin-top: 30px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
    position: relative;
  }
  .streak-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff6b9d, #ff8c5a, #ffd159);
    border-radius: 20px;
    animation: streakFill 2s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    width: 0%;
  }
  @keyframes streakFill {
    to { width: 100%; }
  }
  .streak-label {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    color: rgba(255, 255, 255, 0.45);
    font-size: 13px;
  }

  /* ===== 底部小字 ===== */
  .footer-note {
    margin-top: 30px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.35);
    animation: fadeInUp 1s 1s ease forwards;
    opacity: 0;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== 点击火花 ===== */
  .click-spark {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 28px;
    animation: sparkPop 0.8s ease-out forwards;
  }
  @keyframes sparkPop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; }
  }

  /* ===== 响应式 ===== */
  @media (max-width: 600px) {
    .card { padding: 35px 25px; border-radius: 24px; }
    .number-100 { font-size: 80px; }
    .subtitle { font-size: 22px; }
    .message { font-size: 15px; }
    .spark-icon { font-size: 48px; }
  }

  /* ===== 跳转按钮 ===== */
  .firework-btn {
    display: inline-block;
    margin-top: 30px;
    padding: 14px 40px;
    font-size: 18px;
    font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #fff;
    background: linear-gradient(135deg, #ff6b9d, #ff4500, #ff8c00);
    background-size: 200% 200%;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    text-decoration: none;
    animation: btnGlow 2s ease-in-out infinite, fadeInUp 1s 1.4s ease forwards;
    opacity: 0;
    transition: transform 0.3s;
    box-shadow: 0 8px 30px rgba(255, 70, 100, 0.35);
  }
  .firework-btn:hover {
    transform: scale(1.06) translateY(-2px);
    box-shadow: 0 12px 40px rgba(255, 70, 100, 0.5);
  }
  .firework-btn:active { transform: scale(0.97); }
  @keyframes btnGlow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

</style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>

<!-- 极光 -->
<div class="aurora"></div>

<!-- 漂浮粒子 -->
<div class="particles" id="particles"></div>

<!-- 心形 -->
<div class="hearts-container" id="hearts"></div>

<!-- 主卡片 -->
<div class="main-container">
  <div class="card">
    <div class="spark-icon">🔥</div>
    <div class="number-100">100</div>
    <div class="subtitle">天 火 花</div>
    <div class="divider"></div>
    <div class="message">
      从第 <span>1</span> 天到第 <span>100</span> 天<br>
      每一天的火花<br>
      都是屏幕两端心照不宣的默契 ✨<br><br>
      <span>感谢这100天的陪伴</span><br>
      愿火花继续，故事继续 💕
    </div>

    <div class="streak-bar-container">
      <div class="streak-bar"></div>
      <div class="streak-label">
        <span>Day 1</span><span>100天达成 🎉</span>
      </div>
    </div>

    <div class="footer-note">
      💫 抖音相识 · 火花不灭
    </div>

    <a href="fireworks.html" class="firework-btn">🎆 点击看烟花 🎆</a>
  </div>
</div>

<script>
// ===== 生成星星 =====
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const star = document.createElement('div');
  star.classList.add('star');
  const size = Math.random() * 2.5 + 1;
  star.style.cssText = `
    width: ${size}px; height: ${size}px;
    top: ${Math.random() * 100}%;
    left: ${Math.random() * 100}%;
    --dur: ${Math.random() * 3 + 2}s;
    --delay: ${Math.random() * 4}s;
  `;
  starsContainer.appendChild(star);
}

// ===== 生成漂浮粒子（火花感） =====
const particlesContainer = document.getElementById('particles');
const warmColors = [
  'rgba(255, 150, 100, 0.7)',
  'rgba(255, 200, 80, 0.7)',
  'rgba(255, 120, 160, 0.6)',
  'rgba(255, 180, 120, 0.65)',
  'rgba(200, 140, 255, 0.5)',
  'rgba(255, 220, 100, 0.55)',
];
for (let i = 0; i < 50; i++) {
  const particle = document.createElement('div');
  particle.classList.add('particle');
  particle.style.cssText = `
    --size: ${Math.random() * 5 + 2}px;
    --color: ${warmColors[Math.floor(Math.random() * warmColors.length)]};
    --dur: ${Math.random() * 6 + 6}s;
    --delay: ${Math.random() * 8}s;
    --drift: ${(Math.random() - 0.5) * 100}px;
    bottom: -5%;
    left: ${Math.random() * 100}%;
  `;
  particlesContainer.appendChild(particle);
}

// ===== 生成漂浮爱心 =====
const heartsContainer = document.getElementById('hearts');
const heartEmojis = ['💕', '💖', '💗', '💝', '✨', '💫', '🌟', '🔥', '💛', '🩷'];
for (let i = 0; i < 25; i++) {
  const heart = document.createElement('div');
  heart.classList.add('floating-heart');
  heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  heart.style.cssText = `
    --size: ${Math.random() * 20 + 14}px;
    --dur: ${Math.random() * 8 + 10}s;
    --delay: ${Math.random() * 10}s;
    --rot: ${(Math.random() - 0.5) * 40}deg;
    --rot2: ${(Math.random() - 0.5) * 60}deg;
    bottom: -5%;
    left: ${Math.random() * 100}%;
  `;
  heartsContainer.appendChild(heart);
}

// ===== 点击出现火花 =====
document.addEventListener('click', (e) => {
  const spark = document.createElement('div');
  spark.classList.add('click-spark');
  const emojis = ['🔥', '✨', '💕', '💫', '🌟'];
  spark.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  spark.style.left = e.clientX + 'px';
  spark.style.top = e.clientY + 'px';
  document.body.appendChild(spark);
  spark.addEventListener('animationend', () => spark.remove());
});

// ===== 双击触发爱心雨 =====
document.addEventListener('dblclick', (e) => {
  for (let i = 0; i < 18; i++) {
    setTimeout(() => {
      const burst = document.createElement('div');
      burst.classList.add('click-spark');
      burst.textContent = ['💕', '💖', '💗', '💝', '🔥', '✨', '💫', '🌟'][Math.floor(Math.random() * 8)];
      burst.style.left = (e.clientX + (Math.random() - 0.5) * 200) + 'px';
      burst.style.top = (e.clientY + (Math.random() - 0.5) * 200) + 'px';
      burst.style.animationDuration = '1.2s';
      document.body.appendChild(burst);
      burst.addEventListener('animationend', () => burst.remove());
    }, i * 40);
  }
});

console.log('💫 100天火花纪念日 — 感谢每一次的互发消息，让友谊永远发光 ✨');
console.log('🔥 双击屏幕来一场爱心雨吧！');
</script>
</body>
</html>
