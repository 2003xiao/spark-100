<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎆 烟花雨 · 100天火花纪念</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000008;
    overflow: hidden;
    font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    cursor: crosshair;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  .overlay {
    position: fixed; z-index: 10; inset: 0;
    pointer-events: none;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .title {
    font-size: 60px; color: #fff;
    text-shadow: 0 0 30px rgba(255,180,50,0.8), 0 0 80px rgba(255,100,50,0.5);
    animation: titleGlow 2s ease-in-out infinite;
    letter-spacing: 6px; margin-bottom: 16px;
  }
  @keyframes titleGlow {
    0%,100%{text-shadow:0 0 30px rgba(255,180,50,.8),0 0 80px rgba(255,100,50,.5)}
    50%{text-shadow:0 0 50px rgba(255,200,80,1),0 0 120px rgba(255,150,50,.8),0 0 180px rgba(255,100,50,.6)}
  }

  .subtitle {
    font-size: 22px; color: rgba(255,255,255,.75);
    letter-spacing: 4px; text-shadow: 0 0 15px rgba(255,180,100,.4);
  }

  .hint {
    position: fixed; bottom: 50px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    color: rgba(255,255,255,.45); font-size: 15px;
    letter-spacing: 2px; animation: hintPulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintPulse {
    0%,100%{opacity:.35} 50%{opacity:.8}
  }

  .back-btn {
    position: fixed; top: 30px; left: 30px; z-index: 20;
    padding: 10px 24px; font-size: 15px; font-family: inherit;
    color: #fff; background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.2); border-radius: 50px;
    cursor: pointer; letter-spacing: 2px; text-decoration: none;
    backdrop-filter: blur(10px); transition: all .3s; pointer-events: auto;
  }
  .back-btn:hover {
    background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.4);
    box-shadow: 0 4px 20px rgba(255,255,255,.15);
  }

  @media (max-width:600px) {
    .title{font-size:36px;letter-spacing:3px}
    .subtitle{font-size:16px}
    .back-btn{top:16px;left:16px;padding:8px 18px;font-size:13px}
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="overlay">
  <div class="title">🎆 100天火花 🎆</div>
  <div class="subtitle">这一场烟花，只为你绽放</div>
</div>

<div class="hint">✨ 点击屏幕放烟花 ✨</div>

<a href="index.html" class="back-btn">← 返回</a>

<script>
// ========== Canvas 初始化 ==========
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ========== 真实烟花配色 (偏暖，金/橙/红/白) ==========
const PALETTES = [
  ['#ffcc00','#ff9900','#ff6600','#ffcc33','#ffecb3','#ffffff'],
  ['#ff4444','#ff1744','#ff6e40','#ffab00','#ffd740','#fff8e1'],
  ['#ff6d00','#ff9100','#ffc400','#ffe57f','#ffffff','#ffab40'],
  ['#f50057','#ff4081','#ff6e40','#ffd740','#ffecb3','#ffffff'],
  ['#ff1744','#ff3d00','#ff6d00','#ffab00','#ffea00','#fff9c4'],
  ['#e91e63','#ff5252','#ff6e40','#ffab40','#ffe082','#ffffff'],
  ['#d50000','#ff6d00','#ffc400','#ffeb3b','#ffffff','#ffcc80'],
];

// ========== 音效引擎 ==========
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
}
// 仅返回音频是否已激活
function audioReady() {
  return audioCtx && audioCtx.state === 'running';
}

// 发射音效 — 渐升的咻声
function playLaunch() {
  if (!audioReady()) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(120, t);
  osc.frequency.exponentialRampToValueAtTime(600, t + 0.25);
  osc.frequency.exponentialRampToValueAtTime(1600, t + 0.5);
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.1, t + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.5);
}

// 爆炸音效 — 低频轰 + 中频沙沙
function playExplosion(intensity = 1) {
  if (!audioReady()) return;
  const t = audioCtx.currentTime;
  const dur = 0.6 + intensity * 0.3;

  // 低频轰鸣 (用方波+过滤模拟)
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, t);
  osc.frequency.exponentialRampToValueAtTime(20, t + dur);
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(200, t);
  filter.frequency.exponentialRampToValueAtTime(40, t + dur);
  gain.gain.setValueAtTime(0.15 * intensity, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur);

  // 高频噼啪 (噪声模拟)
  const bufSize = Math.floor(audioCtx.sampleRate * 0.25);
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
  }
  const noise = audioCtx.createBufferSource();
  const noiseGain = audioCtx.createGain();
  const noiseFilter = audioCtx.createBiquadFilter();
  noise.buffer = noiseBuf;
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.setValueAtTime(3000, t);
  noiseFilter.frequency.exponentialRampToValueAtTime(600, t + 0.2);
  noiseGain.gain.setValueAtTime(0.06 * intensity, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noise.start(t);
  noise.stop(t + 0.25);
}

// 小的噼啪尾音
function playCrackle(count = 8) {
  if (!audioReady()) return;
  const t = audioCtx.currentTime;
  for (let i = 0; i < count; i++) {
    const ct = t + Math.random() * 0.5;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800 + Math.random() * 3000, ct);
    gain.gain.setValueAtTime(0.02, ct);
    gain.gain.exponentialRampToValueAtTime(0.001, ct + 0.04);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(ct);
    osc.stop(ct + 0.04);
  }
}

// ========== 简易粒子 (flat, no object overhead) ==========
// 粒子的 x,y,vx,vy,size,life,maxLife,gravity,color 存在类型化数组中
const MAX_PARTICLES = 2000;
const pData = new Float32Array(MAX_PARTICLES * 9); // x,y,vx,vy,size,life,maxLife,gravity,_pad
const pColors = new Array(MAX_PARTICLES);           // color string
let pCount = 0;

function spawnParticle(x, y, vx, vy, color, size, life, gravity) {
  if (pCount >= MAX_PARTICLES) return;
  const i = pCount++;
  const off = i * 9;
  pData[off] = x;
  pData[off + 1] = y;
  pData[off + 2] = vx;
  pData[off + 3] = vy;
  pData[off + 4] = size;
  pData[off + 5] = life;
  pData[off + 6] = life; // maxLife
  pData[off + 7] = gravity;
  pColors[i] = color;
}

// ========== 烟花火箭 ==========
class Rocket {
  constructor(x, targetY) {
    this.x = x;
    this.y = H + 10;
    this.targetY = targetY || rand(H * 0.1, H * 0.5);
    this.vy = rand(-18, -22);
    this.vx = rand(-0.8, 0.8);
    this.color = pick(pick(PALETTES));
    this.palette = pick(PALETTES);
    this.trail = [];
    this.trailMax = 18;
    this.exploded = false;
    this.type = pick(['peony','willow','ring','heart','chrysanthemum','double']);
    this.born = performance.now();
    // 发射音效
    initAudio();
    playLaunch();
  }

  update() {
    if (this.exploded) return null;
    this.x += this.vx;
    this.vy += 0.06;
    this.y += this.vy;

    // 发射尾烟 (简单的灰白拖尾点)
    if (Math.random() < 0.55) {
      spawnParticle(
        this.x + rand(-1.5, 1.5), this.y + rand(-1.5, 1.5),
        rand(-0.2, 0.2), rand(0.3, 1.2),
        '#ffcc80', rand(1.2, 2.5), randInt(10, 20), 0.01
      );
    }

    if (this.vy >= 0 || this.y <= this.targetY) {
      this.exploded = true;
      playExplosion(0.7 + Math.random() * 0.6);
      if (Math.random() < 0.5) playCrackle(randInt(5, 14));
      return this.explode();
    }
    return null;
  }

  explode() {
    const list = [];
    const cx = this.x, cy = this.y;
    const total = randInt(60, 120);
    const pal = this.palette;

    // === 中心闪光 (少量亮白粒子) ===
    for (let i = 0; i < 12; i++) {
      const a = rand(0, Math.PI * 2);
      const s = rand(0.5, 2);
      list.push([cx + Math.cos(a) * s, cy + Math.sin(a) * s,
        Math.cos(a) * rand(0.3, 1.5), Math.sin(a) * rand(0.3, 1.5),
        '#ffffff', rand(1.5, 3), randInt(5, 15), 0.01]);
    }

    // === 主体烟花 ===
    switch (this.type) {
      case 'peony': // 牡丹 - 经典球形均匀散射
        for (let i = 0; i < total; i++) {
          const a = rand(0, Math.PI * 2);
          const s = rand(2, 9);
          list.push([cx, cy, Math.cos(a) * s, Math.sin(a) * s,
            pick(pal), rand(1.8, 4.2), randInt(45, 95), 0.04]);
        }
        break;

      case 'willow': // 垂柳 - 抛物线落下
        for (let i = 0; i < total; i++) {
          const a = rand(0, Math.PI * 2);
          const s = rand(1.5, 7);
          list.push([cx, cy, Math.cos(a) * s * 0.9,
            Math.sin(a) * s * 0.5 - rand(0.5, 2.5),
            pick(pal), rand(1.5, 3), randInt(70, 150), 0.08]);
        }
        break;

      case 'ring': // 圆环
        for (let i = 0; i < total; i++) {
          const a = (Math.PI * 2 / total) * i + rand(-0.04, 0.04);
          const s = rand(5.5, 8.5);
          list.push([cx, cy, Math.cos(a) * s, Math.sin(a) * s,
            pick(pal), rand(2, 3.5), randInt(50, 90), 0.03]);
        }
        break;

      case 'heart': // 心形
        for (let i = 0; i < total; i++) {
          const t = (Math.PI * 2 / total) * i;
          const px = 16 * Math.pow(Math.sin(t), 3);
          const py = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
          const s = rand(0.06, 0.1);
          list.push([cx, cy, px * s, py * s,
            pick(pal), rand(1.5, 3.5), randInt(45, 85), 0.04]);
        }
        break;

      case 'chrysanthemum': // 菊花 - 先喷射再散开（长拖尾）
        for (let i = 0; i < total; i++) {
          const a = rand(0, Math.PI * 2);
          const s = rand(3, 8);
          list.push([cx, cy, Math.cos(a) * s, Math.sin(a) * s,
            pick(pal), rand(1.5, 3.5), randInt(60, 120), 0.06]);
        }
        break;

      case 'double': // 双层 - 外圈 + 内圈
        for (let i = 0; i < total / 2; i++) {
          const a = rand(0, Math.PI * 2);
          const s = rand(6, 10);
          list.push([cx, cy, Math.cos(a) * s, Math.sin(a) * s,
            pick(pal), rand(2, 3.5), randInt(35, 65), 0.05]);
        }
        for (let i = 0; i < total / 2; i++) {
          const a = rand(0, Math.PI * 2);
          const s = rand(1.5, 4);
          list.push([cx, cy, Math.cos(a) * s, Math.sin(a) * s,
            pick(pick(PALETTES)), rand(2.5, 5), randInt(55, 105), 0.03]);
        }
        break;
    }

    return list;
  }

  draw(ctx) {
    if (this.exploded) return;
    // 火箭本体 — 亮白点 + 光晕
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.restore();

    // 发射管拖尾 (简单的线段)
    if (this.trail.length > 1) {
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
    }
  }
}

// ========== 场景 ==========
const rockets = [];

// 自动发射
let autoTimer = 0;
let autoInterval = rand(30, 55);

function launchOne() {
  rockets.push(new Rocket(rand(W * 0.08, W * 0.92), rand(H * 0.08, H * 0.45)));
}

function launchSalvo(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      rockets.push(new Rocket(rand(W * 0.05, W * 0.95), rand(H * 0.06, H * 0.4)));
    }, i * rand(60, 200));
  }
}

// 首次交互激活音频
function activateAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().then(() => {
      console.log('🔊 音频已激活');
    });
  }
}
document.addEventListener('click', activateAudio, { once: true });
document.addEventListener('touchstart', activateAudio, { once: true });

// 点击
canvas.addEventListener('click', (e) => {
  rockets.push(new Rocket(e.clientX, rand(H * 0.08, H * 0.4)));
  setTimeout(() => {
    rockets.push(new Rocket(e.clientX + rand(-80, 80), rand(H * 0.08, H * 0.4)));
  }, 150);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const x = e.touches[0].clientX;
  rockets.push(new Rocket(x, rand(H * 0.08, H * 0.4)));
}, { passive: false });

// ========== 颜色亮度的快速计算 (缓存) ==========
const glowCache = new Map();
function glowColor(hex, alpha) {
  const key = hex + alpha;
  if (glowCache.has(key)) return glowCache.get(key);
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const result = `rgba(${r},${g},${b},${alpha})`;
  if (glowCache.size < 500) glowCache.set(key, result);
  return result;
}

// ========== 渲染循环 ==========
// 预创建星空背景
const bgStars = [];
for (let i = 0; i < 60; i++) {
  bgStars.push({
    x: rand(0, 2000), y: rand(0, 2000),
    r: rand(0.3, 1.2), twinkle: rand(0, Math.PI * 2)
  });
}

let frameCount = 0;

function animate(time) {
  requestAnimationFrame(animate);
  frameCount++;

  // === 清屏: 深色夜空 + 极淡烟雾残留 ===
  ctx.fillStyle = 'rgba(0, 0, 10, 0.22)';
  ctx.fillRect(0, 0, W, H);

  // === 背景星星 (微弱静态，不闪烁以省性能) ===
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < bgStars.length; i++) {
    const s = bgStars[i];
    const sx = s.x % W, sy = s.y % H;
    ctx.globalAlpha = 0.35 + Math.sin(frameCount * 0.02 + s.twinkle) * 0.25;
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // === 自动发射 ===
  autoTimer++;
  if (autoTimer >= autoInterval) {
    autoTimer = 0;
    autoInterval = rand(22, 50);
    launchOne();
    if (Math.random() < 0.12) launchSalvo(randInt(3, 6));
  }

  // === 更新火箭 & 爆炸 ===
  const active = [];
  for (let i = 0; i < rockets.length; i++) {
    const r = rockets[i];
    // 尾烟轨迹
    r.trail.push({ x: r.x, y: r.y });
    if (r.trail.length > r.trailMax) r.trail.shift();

    const spawns = r.update();
    if (spawns) {
      for (let j = 0; j < spawns.length; j++) {
        const s = spawns[j];
        spawnParticle(s[0], s[1], s[2], s[3], s[4], s[5], s[6], s[7]);
      }
    }
    r.draw(ctx);
    if (!r.exploded) active.push(r);
  }
  rockets.length = 0;
  rockets.push(...active);

  // === 更新粒子 (批量，无对象分配) ===
  let writeIdx = 0;
  for (let i = 0; i < pCount; i++) {
    const off = i * 9;
    const vx = pData[off + 2];
    const vy = pData[off + 3];
    const gravity = pData[off + 7];
    const life = pData[off + 5];

    pData[off] += vx;
    pData[off + 1] += vy;
    pData[off + 3] += gravity;
    pData[off + 2] *= 0.995;
    pData[off + 5] -= 1;

    if (life <= 1) continue; // dead, skip

    // 如果粒子没死，compact 到前面
    if (writeIdx !== i) {
      const wo = writeIdx * 9;
      pData[wo] = pData[off];
      pData[wo + 1] = pData[off + 1];
      pData[wo + 2] = pData[off + 2];
      pData[wo + 3] = pData[off + 3];
      pData[wo + 4] = pData[off + 4];
      pData[wo + 5] = pData[off + 5];
      pData[wo + 6] = pData[off + 6];
      pData[wo + 7] = pData[off + 7];
      pColors[writeIdx] = pColors[i];
    }
    writeIdx++;
  }
  pCount = writeIdx;

  // === 绘制粒子 (按颜色批次绘制以减少 state change) ===
  // 先绘制主光点
  for (let i = 0; i < pCount; i++) {
    const off = i * 9;
    const x = pData[off];
    const y = pData[off + 1];
    const size = pData[off + 4];
    const life = pData[off + 5];
    const maxLife = pData[off + 6];
    const alpha = Math.max(0, life / maxLife);

    // 跳过视野外的
    if (x < -20 || x > W + 20 || y < -20 || y > H + 20) continue;

    const color = pColors[i];
    const r = size * alpha; // 粒子随生命缩小

    // 外层光晕 (柔和)
    ctx.globalAlpha = alpha * 0.25;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // 中层光晕
    ctx.globalAlpha = alpha * 0.5;
    ctx.beginPath();
    ctx.arc(x, y, r * 1.3, 0, Math.PI * 2);
    ctx.fill();

    // 核心亮点
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // 主体色
    ctx.globalAlpha = alpha * 0.85;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // === 性能监控: 粒子过多时降低生成率 ===
  if (pCount > 1500) {
    autoInterval = Math.max(autoInterval, 35);
  }
}

// ========== 开场 ==========
function openingShow() {
  for (let w = 0; w < 4; w++) {
    setTimeout(() => launchSalvo(randInt(5, 10)), w * 800);
  }
}
setTimeout(openingShow, 500);
requestAnimationFrame(animate);

console.log('🎆 烟花雨已就绪 — 点击屏幕放烟花！');
console.log('💕 100天火花纪念 — 这一场烟花，只为你绽放');
</script>
</body>
</html>
