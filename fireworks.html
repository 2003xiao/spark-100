<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎆 烟花雨 · 100天火花纪念</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000010;
    overflow: hidden;
    font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    cursor: crosshair;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  /* ===== 文字叠加层 ===== */
  .overlay {
    position: fixed;
    z-index: 10;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .title {
    font-size: 60px;
    color: #fff;
    text-shadow:
      0 0 30px rgba(255, 180, 50, 0.8),
      0 0 80px rgba(255, 100, 50, 0.5),
      0 0 120px rgba(255, 200, 80, 0.3);
    animation: titleGlow 2s ease-in-out infinite;
    letter-spacing: 6px;
    margin-bottom: 16px;
  }
  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 30px rgba(255, 180, 50, 0.8), 0 0 80px rgba(255, 100, 50, 0.5); }
    50% { text-shadow: 0 0 50px rgba(255, 200, 80, 1), 0 0 120px rgba(255, 150, 50, 0.8), 0 0 180px rgba(255, 100, 50, 0.6); }
  }

  .subtitle {
    font-size: 22px;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 4px;
    text-shadow: 0 0 15px rgba(255, 180, 100, 0.4);
  }

  .hint {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: rgba(255, 255, 255, 0.45);
    font-size: 15px;
    letter-spacing: 2px;
    animation: hintPulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.8; }
  }

  /* ===== 返回按钮 ===== */
  .back-btn {
    position: fixed;
    top: 30px;
    left: 30px;
    z-index: 20;
    padding: 10px 24px;
    font-size: 15px;
    font-family: inherit;
    color: #fff;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    text-decoration: none;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    pointer-events: auto;
  }
  .back-btn:hover {
    background: rgba(255, 255, 255, 0.18);
    border-color: rgba(255, 255, 255, 0.4);
    box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
  }

  @media (max-width: 600px) {
    .title { font-size: 36px; letter-spacing: 3px; }
    .subtitle { font-size: 16px; }
    .back-btn { top: 16px; left: 16px; padding: 8px 18px; font-size: 13px; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="overlay">
  <div class="title">🎆 100天火花 🎆</div>
  <div class="subtitle">这一场烟花，只为你绽放</div>
</div>

<div class="hint">✨ 点击屏幕放烟花 ✨</div>

<a href="index.html" class="back-btn">← 返回</a>

<script>
// ========== Canvas 初始化 ==========
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ========== 工具函数 ==========
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ========== 颜色调色板 ==========
const PALETTES = [
  ['#ff6b9d', '#ff4081', '#ff80ab', '#ff1493', '#ff2d55'],
  ['#ffd740', '#ffab00', '#ff9100', '#ff6d00', '#ffe57f'],
  ['#7c4dff', '#536dfe', '#448aff', '#40c4ff', '#18ffff'],
  ['#69f0ae', '#00e676', '#76ff03', '#b2ff59', '#eeff41'],
  ['#ff4081', '#ff6e40', '#ffd740', '#69f0ae', '#40c4ff'],
  ['#ff1744', '#ff9100', '#f50057', '#d500f9', '#2979ff'],
  ['#ffea00', '#ffc400', '#ff5722', '#e91e63', '#9c27b0'],
];

// ========== 粒子类 ==========
class Particle {
  constructor(x, y, vx, vy, color, size, life, gravity = 0.05, fade = 0.98) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.size = size;
    this.life = life;
    this.maxLife = life;
    this.gravity = gravity;
    this.fade = fade;
    this.alpha = 1;
    this.trail = [];
    this.hasTrail = Math.random() < 0.4;
  }

  update() {
    this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
    if (this.trail.length > 6) this.trail.shift();

    this.x += this.vx;
    this.vy += this.gravity;
    this.y += this.vy;
    this.vx *= 0.99;
    this.life--;
    this.alpha = this.life / this.maxLife;
  }

  draw(ctx) {
    // 拖尾
    if (this.hasTrail && this.trail.length > 1) {
      for (let i = 0; i < this.trail.length - 1; i++) {
        const t = this.trail[i];
        const progress = i / this.trail.length;
        ctx.beginPath();
        ctx.moveTo(t.x, t.y);
        ctx.lineTo(this.trail[i + 1].x, this.trail[i + 1].y);
        ctx.strokeStyle = this.color.replace(')', `, ${progress * 0.5})`).replace('rgb', 'rgba');
        if (this.color.startsWith('#')) {
          ctx.strokeStyle = this.color + Math.floor(progress * 80).toString(16).padStart(2, '0');
        }
        ctx.lineWidth = this.size * progress * 0.6;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    // 主体光点
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();

    // 光晕
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
    glow.addColorStop(0, this.color);
    glow.addColorStop(0.4, this.color.replace(')', ', 0.4)').replace('rgb', 'rgba'));
    if (this.color.startsWith('#')) {
      // handle hex
      glow.addColorStop(0.4, 'transparent');
    }
    glow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    ctx.restore();
  }

  get dead() { return this.life <= 0; }
}

// ========== 烟花火箭 ==========
class Rocket {
  constructor(x, targetY) {
    this.x = x;
    this.y = H;
    this.targetY = targetY || rand(H * 0.1, H * 0.55);
    this.vx = rand(-1.5, 1.5);
    this.vy = rand(-16, -20);
    this.color = pick(pick(PALETTES));
    this.trailParticles = [];
    this.exploded = false;
    this.type = pick(['circle', 'willow', 'ring', 'heart', 'double', 'star']);
  }

  update() {
    if (this.exploded) return;

    this.vy += 0.08; // 轻微重力
    this.x += this.vx;
    this.y += this.vy;

    // 尾迹
    if (Math.random() < 0.7) {
      this.trailParticles.push(new Particle(
        this.x + rand(-2, 2), this.y + rand(-2, 2),
        rand(-0.3, 0.3), rand(0.5, 2),
        this.color, rand(1.5, 3), randInt(15, 25), 0.02, 0.95
      ));
    }

    // 到达顶点时爆炸
    if (this.vy >= 0 || this.y <= this.targetY) {
      this.exploded = true;
      return this.explode();
    }
    return [];
  }

  explode() {
    const particles = [];
    const count = randInt(80, 160);
    const palette = pick(PALETTES);

    switch (this.type) {
      case 'circle':
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(1.5, 8);
          particles.push(new Particle(
            this.x, this.y,
            Math.cos(angle) * speed, Math.sin(angle) * speed,
            pick(palette), rand(1.8, 4.5), randInt(40, 90), 0.04, 0.97
          ));
        }
        break;

      case 'willow':
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(1, 7);
          particles.push(new Particle(
            this.x, this.y,
            Math.cos(angle) * speed, Math.sin(angle) * speed * 0.7 - rand(1, 4),
            pick(palette), rand(1.5, 3.5), randInt(60, 130), 0.07, 0.985
          ));
        }
        break;

      case 'ring':
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i;
          const speed = rand(4, 7);
          particles.push(new Particle(
            this.x, this.y,
            Math.cos(angle) * speed, Math.sin(angle) * speed,
            pick(palette), rand(2, 4), randInt(45, 85), 0.03, 0.975
          ));
        }
        break;

      case 'heart':
        for (let i = 0; i < count; i++) {
          const t = (Math.PI * 2 / count) * i;
          // 心形参数方程
          const scale = rand(3, 7);
          const px = 16 * Math.pow(Math.sin(t), 3);
          const py = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
          particles.push(new Particle(
            this.x, this.y,
            px * scale * 0.08, py * scale * 0.08,
            pick(palette), rand(1.5, 3.5), randInt(40, 80), 0.04, 0.97
          ));
        }
        break;

      case 'double':
        // 外层
        for (let i = 0; i < count / 2; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(5, 9);
          particles.push(new Particle(
            this.x, this.y,
            Math.cos(angle) * speed, Math.sin(angle) * speed,
            pick(palette), rand(2, 4), randInt(30, 60), 0.05, 0.96
          ));
        }
        // 内层（延迟爆发感：通过初始速度更小来模拟）
        for (let i = 0; i < count / 2; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(1.5, 4);
          particles.push(new Particle(
            this.x, this.y,
            Math.cos(angle) * speed, Math.sin(angle) * speed,
            pick(PALETTES[randInt(0, PALETTES.length - 1)]), rand(2.5, 5), randInt(50, 100), 0.03, 0.98
          ));
        }
        break;

      case 'star':
        const points = 5 + randInt(0, 4);
        for (let p = 0; p < points; p++) {
          const baseAngle = (Math.PI * 2 / points) * p;
          for (let j = 0; j < count / points; j++) {
            const spread = rand(-0.15, 0.15);
            const angle = baseAngle + spread;
            const speed = rand(3, 8);
            particles.push(new Particle(
              this.x, this.y,
              Math.cos(angle) * speed, Math.sin(angle) * speed,
              pick(palette), rand(1.5, 3.5), randInt(35, 75), 0.04, 0.97
            ));
          }
        }
        break;
    }

    return particles;
  }

  draw(ctx) {
    // 火箭主体
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 10);
    glow.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
    glow.addColorStop(0.5, this.color);
    glow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
    ctx.restore();
  }
}

// ========== 场景管理 ==========
const rockets = [];
let particles = [];

// 自动发射烟花
let autoTimer = 0;
let autoInterval = rand(25, 50);

function autoLaunch() {
  const x = rand(W * 0.08, W * 0.92);
  const targetY = rand(H * 0.08, H * 0.45);
  rockets.push(new Rocket(x, targetY));
}

// 批量发射（烟花雨）
function launchSalvo(count = 5) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const x = rand(W * 0.05, W * 0.95);
      rockets.push(new Rocket(x, rand(H * 0.06, H * 0.4)));
    }, i * rand(80, 250));
  }
}

// 点击放烟花
canvas.addEventListener('click', (e) => {
  const x = e.clientX;
  const r = new Rocket(x, rand(H * 0.08, H * 0.4));
  r.type = pick(['circle', 'willow', 'ring', 'heart', 'double', 'star']);
  rockets.push(r);

  // 同时在附近发射额外烟花
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const ox = x + rand(-120, 120);
      rockets.push(new Rocket(
        Math.max(10, Math.min(W - 10, ox)),
        rand(H * 0.08, H * 0.4)
      ));
    }, rand(100, 400));
  }
});

// 触摸支持
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const x = touch.clientX;
  const r = new Rocket(x, rand(H * 0.08, H * 0.4));
  r.type = pick(['circle', 'willow', 'ring', 'heart', 'double', 'star']);
  rockets.push(r);
}, { passive: false });

// ========== 渲染循环 ==========
function animate() {
  requestAnimationFrame(animate);

  // 半透明背景覆盖，产生拖尾/余烬效果
  ctx.fillStyle = 'rgba(0, 0, 16, 0.18)';
  ctx.fillRect(0, 0, W, H);

  // 自动发射
  autoTimer++;
  if (autoTimer >= autoInterval) {
    autoTimer = 0;
    autoInterval = rand(18, 45);
    autoLaunch();
    // 偶尔来一波齐射
    if (Math.random() < 0.15) {
      launchSalvo(randInt(3, 8));
    }
  }

  // 更新火箭
  const activeRockets = [];
  for (const rocket of rockets) {
    if (!rocket.exploded) {
      // 绘制尾迹
      for (const tp of rocket.trailParticles) {
        tp.update();
        tp.draw(ctx);
      }
      rocket.trailParticles = rocket.trailParticles.filter(tp => !tp.dead);

      const newParticles = rocket.update();
      if (newParticles && newParticles.length > 0) {
        particles.push(...newParticles);
      }
      rocket.draw(ctx);
    }
    if (!rocket.exploded) {
      activeRockets.push(rocket);
    }
  }
  rockets.length = 0;
  rockets.push(...activeRockets);

  // 更新粒子
  const aliveParticles = [];
  for (const p of particles) {
    p.update();
    p.draw(ctx);
    if (!p.dead) aliveParticles.push(p);
  }
  particles = aliveParticles;
}

// ========== 开场连发烟花雨 ==========
function openingShow() {
  const waves = 5;
  for (let w = 0; w < waves; w++) {
    setTimeout(() => {
      launchSalvo(randInt(6, 12));
    }, w * 900);
  }
}

// 启动
setTimeout(openingShow, 400);
animate();

console.log('🎆 烟花雨已就绪 — 点击屏幕放烟花！');
console.log('💕 100天火花纪念 — 这一场烟花，只为你绽放');
</script>
</body>
</html>
